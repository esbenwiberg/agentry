id = "ship"
name = "Ship workflow"
description = "End-to-end orchestrator: commit → review → PR. Chains the commits, code-review, and pull-requests entries."
version = "0.1.0"

layers = ["harness"]

[[provides]]
source   = "skills/ship/skill.md"
target   = ".claude/skills/ship/skill.md"
flavor   = "claude"
conflict = "prompt"

[[provides]]
source   = "skills/ship/command.md"
target   = ".claude/commands/ship.md"
flavor   = "claude"
conflict = "prompt"

[[provides]]
source   = "skills/ship/rules.md"
target   = ".claude/skills/ship/rules.md"
flavor   = "claude"
conflict = "prompt"

[[provides]]
source   = "recipes/ship/ship-workflow.md"
target   = ".agentry/recipes/ship/ship-workflow.md"
flavor   = "agnostic"
conflict = "prompt"

[detect]
any_of = [
  ".claude/skills/ship/skill.md",
  ".claude/commands/ship.md",
  ".agentry/recipes/ship/ship-workflow.md",
]

[requires]
git     = true
entries = ["commits", "code-review", "pull-requests"]
tools   = []
