id = "pull-requests"
name = "Pull request workflow"
description = "What/Why/How PRs with a Test plan, conventional-commit titles, and gh-CLI flow (with notes for GitLab/ADO)."
version = "0.1.0"

layers = ["harness", "conventions"]

[[provides]]
source   = "skills/pull-requests/skill.md"
target   = ".claude/skills/pull-requests/skill.md"
flavor   = "claude"
conflict = "prompt"

[[provides]]
source   = "skills/pull-requests/command.md"
target   = ".claude/commands/pr.md"
flavor   = "claude"
conflict = "prompt"

[[provides]]
source   = "skills/pull-requests/rules.md"
target   = ".claude/skills/pull-requests/rules.md"
flavor   = "claude"
conflict = "prompt"

[[provides]]
source   = "recipes/pull-requests/pr-template.md"
target   = ".agentry/recipes/pull-requests/pr-template.md"
flavor   = "agnostic"
conflict = "prompt"

[detect]
any_of = [
  ".claude/skills/pull-requests/skill.md",
  ".claude/commands/pr.md",
  ".agentry/recipes/pull-requests/pr-template.md",
]

[requires]
git     = true
entries = []
tools   = ["gh"]
