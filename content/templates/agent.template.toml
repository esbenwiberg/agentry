# .agent.toml — Declarative project profile for AI coding agents.
#
# Tool-agnostic. Any agent (Claude Code, Cursor, Aider, Continue, autopod, ...)
# can read this to learn how to build, test, run, and reason about the project.
# Spec: docs/adr/0003-agent-profile-schema.md (agentry repo).
#
# Conventions:
#   - All paths are repo-relative, forward-slash separated.
#   - Empty string ("") in a command field = "not configured" — tools should
#     treat that capability as unavailable rather than fail.
#   - Free-form lists (languages, frameworks, paths) use lowercase strings.

schema_version = "1"
name           = "<PROJECT_NAME>"
description    = "Replace with a one-line description of the project."

# --- Stack ---------------------------------------------------------------
# Informational hints. Free-form; no fixed taxonomy.
[stack]
languages  = []   # e.g., ["typescript", "csharp"]
frameworks = []   # e.g., ["react", "aspnet"]

# --- Commands ------------------------------------------------------------
# Shell commands run from the repository root. Empty string = unavailable.
[commands]
install = ""   # e.g., "npm ci"               install dependencies
build   = ""   # e.g., "npm run build"        produce a build artefact
test    = ""   # e.g., "npm test"             run the test suite
lint    = ""   # e.g., "npm run lint"         static analysis / style checks
format  = ""   # e.g., "npm run format"       autoformat
dev     = ""   # e.g., "npm run dev"          long-running dev server
start   = ""   # e.g., "npm start"            run the production binary

# --- Paths ---------------------------------------------------------------
# Repo-relative paths an agent can use to scope reads, searches, edits.
[paths]
src   = []          # e.g., ["src"]
tests = []          # e.g., ["tests", "spec"]
docs  = ["docs"]

# --- Health (optional) ---------------------------------------------------
# If `dev` or `start` exposes a health endpoint, name it here so an agent
# can probe readiness before running checks against the running app.
[health]
url = ""            # e.g., "http://localhost:3000/healthz"

# --- Agents --------------------------------------------------------------
# Hints aimed specifically at AI agents. Other fields above are universal;
# this table is where agentry-specific or agent-specific keys live.
[agents]
context_files = ["CLAUDE.md", "PRACTICES.md"]
adr_dir       = "docs/adr"
